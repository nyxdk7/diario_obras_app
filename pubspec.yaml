name: diario_obras_app
description: Aplicativo mobile do Dash Sistem - Diário de Obras
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  path: ^1.9.1
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.34
  image_picker: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.7.0
  drift_dev: ^2.28.2
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
    - assets/images/app_icon_foreground.png
    - assets/images/splash_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 23

flutter_native_splash:
  color: "#F4F7FB"
  image: assets/images/splash_logo.png
  android: true
  ios: false
  android_12:
    color: "#F4F7FB"
    image: assets/images/app_icon_foreground.png